[package]
name = "armature-mcp"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Model Context Protocol (MCP) server support for Armature applications"
keywords = ["mcp", "ai", "llm", "tools", "armature"]
categories = ["web-programming", "development-tools"]

[dependencies]
armature-core = { path = "../armature-core", version = "0.2.1" }
armature-proc-macro = { path = "../armature-proc-macro", version = "0.1.2" }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Async runtime
tokio = { version = "1.35", features = ["full"] }
async-trait = "0.1"

# Error handling
thiserror = "2.0"

# Compile-time collection of MCP tools
inventory = "0.3"

# Schema generation
schemars = "0.8"

# UUID for request IDs
uuid = { version = "1.6", features = ["v4"] }

[dev-dependencies]
tokio-test = "0.4"
